<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" 
content="width=device-width, initial-scale=1.0">
  <title>Lavandería Premium</title>
  <style>

body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1626806819282-2c1dc01a5e0c");
background-size:cover;
background-attachment:fixed;
color:white;
}

/* CAPA OSCURA */

.overlay{
background:rgba(0,0,0,0.7);
min-height:100vh;
}

/* MENU */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:black;
}

.logo{
font-size:24px;
font-weight:bold;
color:#ff3b3b;
}

.search{
padding:8px;
border-radius:20px;
border:none;
}

/* SLIDER */

.slider{
width:100%;
height:300px;
position:relative;
overflow:hidden;
}

.slide{
width:100%;
height:300px;
object-fit:cover;
position:absolute;
opacity:0;
transition:opacity 1s;
}

/* SERVICIOS */

.servicios{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#1c1c1c;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
text-align:center;
padding:10px;
}

.btn{
background:#e63946;
color:white;
border:none;
padding:12px;
width:100%;
cursor:pointer;
font-size:16px;
}

/* FORMULARIO */

.formulario{
background:#1c1c1c;
margin:40px;
padding:30px;
border-radius:15px;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border-radius:10px;
border:none;
}

/* CARRITO */

.carrito{
position:fixed;
top:90px;
right:20px;
background:#1c1c1c;
padding:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px 20px;
border-radius:50px;
color:white;
text-decoration:none;
font-weight:bold;
animation:flotar 2s infinite;
}

@keyframes flotar{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* BURBUJAS */

.bubble{
position:fixed;
bottom:-100px;
background:rgba(255,255,255,0.2);
border-radius:50%;
animation:subir 10s infinite;
}

@keyframes subir{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

</style></head><body><div class="overlay"><nav><div class="logo">Lavandería Premium</div><input class="search" placeholder="Buscar servicio"></nav><div class="slider"><img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952" class="slide">
<img src="https://images.unsplash.com/photo-1604335399105-a0c585fd81a1" class="slide">
<img src="https://images.unsplash.com/photo-1596464716127-f2a82984de30" class="slide"></div><section class="servicios"><div class="card"><img src="https://images.unsplash.com/photo-1626806819282-2c1dc01a5e0c"><h3>Lavado de Ropa</h3><button class="btn" onclick="agregar('Lavado de Ropa')">Agregar</button>

</div><div class="card"><img src="https://images.unsplash.com/photo-1596464716127-f2a82984de30"><h3>Lavado de Alfombras</h3><button class="btn" onclick="agregar('Lavado de Alfombras')">Agregar</button>

</div><div class="card"><img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba6"><h3>Limpieza de Zapatos</h3><button class="btn" onclick="agregar('Limpieza de Zapatos')">Agregar</button>

</div></section><div class="formulario"><h2>Solicitar Recolección</h2><input id="nombre" placeholder="Nombre"><input id="direccion" placeholder="Dirección"><textarea id="mensaje" placeholder="Servicio que necesitas"></textarea><button class="btn" onclick="enviar()">Enviar Pedido</button>

</div><div class="carrito"><h3>Pedidos</h3><ul id="lista"></ul></div><a class="whatsapp" href="https://wa.me/525587741101">WhatsApp</a>

</div><script>

/* SLIDER */

let slides=document.querySelectorAll(".slide")
let index=0

function cambiarFoto(){

slides.forEach((img)=>{img.style.opacity=0})

slides[index].style.opacity=1

index++

if(index>=slides.length){index=0}

}

setInterval(cambiarFoto,3000)

cambiarFoto()

/* CARRITO */

let pedidos=[]

function agregar(servicio){

pedidos.push(servicio)

let lista=document.getElementById("lista")

let item=document.createElement("li")

item.textContent=servicio

lista.appendChild(item)

}

/* ENVIAR A WHATSAPP */

function enviar(){

let nombre=document.getElementById("nombre").value
let direccion=document.getElementById("direccion").value
let mensaje=document.getElementById("mensaje").value

let texto="Pedido Lavandería Premium%0A"
texto+="Nombre: "+nombre+"%0A"
texto+="Dirección: "+direccion+"%0A"
texto+="Servicios: "+pedidos.join(", ")+"%0A"
texto+="Mensaje: "+mensaje

window.open("https://wa.me/525587741101?text="+texto)

}

/* BURBUJAS */

for(let i=0;i<15;i++){

let bubble=document.createElement("div")

bubble.className="bubble"

bubble.style.width=Math.random()*40+"px"
bubble.style.height=bubble.style.width
bubble.style.left=Math.random()*100+"%"
bubble.style.animationDuration=(5+Math.random()*10)+"s"

document.body.appendChild(bubble)

}

</script></body></html>
