<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Uniformes Médicos Pro</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>🩺 Uniformes Médicos</h1>

<div class="carrito-icono">
🛒 <span id="contador">0</span>
</div>

</header>

<section class="catalogo">

<div class="producto">

<img src="https://i.imgur.com/0KFBHTB.jpg">

<h3>Uniforme Azul</h3>

<p>$450</p>

<button onclick="agregar('Uniforme Azul',450)">Agregar</button>

</div>

<div class="producto">

<img src="https://i.imgur.com/Td6XG9T.jpg">

<h3>Uniforme Verde</h3>

<p>$450</p>

<button onclick="agregar('Uniforme Verde',450)">Agregar</button>

</div>

<div class="producto">

<img src="https://i.imgur.com/b0W9X4S.jpg">

<h3>Uniforme Negro</h3>

<p>$480</p>

<button onclick="agregar('Uniforme Negro',480)">Agregar</button>

</div>

</section>

<section class="carrito">

<h2>Carrito</h2>

<ul id="lista"></ul>

<p>Subtotal: $<span id="subtotal">0</span></p>

<p>Envío: $<span id="envio">0</span></p>

<p>Total: $<span id="total">0</span></p>

</section>

<section class="pago">

<h2>Pago</h2>

<input id="nombre" placeholder="Nombre">

<input id="direccion" placeholder="Dirección de envío">

<input id="tarjeta" placeholder="Número de tarjeta">

<input id="exp" placeholder="Expiración">

<input id="cvv" placeholder="CVV">

<button onclick="pagar()">Pagar</button>

</section>

<section class="reseñas">

<h2>Reseñas</h2>

<textarea id="comentario" placeholder="Escribe tu reseña"></textarea>

<button onclick="agregarReseña()">Publicar</button>

<div id="listaReseñas"></div>

</section>

<script src="script.js"></script>

</body>
</html>
