<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Uniformes Quirúrgicos</title>

<style>

/* ESTILO GENERAL */

body{
font-family:Arial;
margin:0;
background:#f2f6ff;
}

/* MENU PROFESIONAL */

nav{

background:linear-gradient(90deg,#2b7cff,#00c6ff);
padding:15px;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:10;

}

nav h2{

margin:0;

}

nav ul{

list-style:none;
display:flex;
gap:20px;
margin:0;

}

nav a{

color:white;
text-decoration:none;
font-weight:bold;

}

/* CATALOGO */

.catalogo{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;

}

/* PRODUCTO */

.producto{

background:white;
border-radius:12px;
padding:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;

animation:aparecer .6s ease;

}

@keyframes aparecer{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.producto img{

width:100%;
border-radius:10px;
transition:transform .3s;

}

/* ZOOM FOTO */

.producto img:hover{

transform:scale(1.2);

}

.precio{

font-size:20px;
color:#2b7cff;
font-weight:bold;

}

select{

width:100%;
padding:8px;
margin-top:10px;

}

button{

margin-top:10px;
background:#2b7cff;
border:none;
color:white;
padding:10px;
border-radius:8px;
cursor:pointer;
width:100%;

}

/* CARRITO */

.carrito{

position:fixed;
right:0;
top:0;
width:320px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
padding:20px;
overflow:auto;

}

.item{

display:flex;
gap:10px;
margin-bottom:15px;
border-bottom:1px solid #eee;
padding-bottom:10px;

}

.item img{

width:50px;
border-radius:6px;

}

.total{

font-size:20px;
font-weight:bold;
margin-top:10px;

}

input{

width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;

}

.whatsapp{

background:#25D366;

}

footer{

text-align:center;
padding:20px;
color:#777;

}

</style>

</head>

<body>

<!-- MENU -->

<nav>

<h2>🩺 Uniformes</h2>

<ul>

<li><a href="#">Inicio</a></li>
<li><a href="#">Catálogo</a></li>
<li><a href="#">Reseñas</a></li>
<li><a href="#">Contacto</a></li>

</ul>

</nav>

<!-- CATALOGO -->

<section class="catalogo">

<div class="producto">

<img src="img/rosa.jpg">

<h3>Uniforme Rosa</h3>

<p class="precio">$400</p>

<select id="talla1">

<option>CH</option>
<option>M</option>
<option>G</option>
<option>XL</option>

</select>

<button onclick="agregar('Uniforme Rosa',400,'img/rosa.jpg','talla1')">Agregar</button>

</div>

<div class="producto">

<img src="img/amarillo.jpg">

<h3>Uniforme Amarillo</h3>

<p class="precio">$400</p>

<select id="talla2">

<option>CH</option>
<option>M</option>
<option>G</option>
<option>XL</option>

</select>

<button onclick="agregar('Uniforme Amarillo',400,'img/amarillo.jpg','talla2')">Agregar</button>

</div>

<div class="producto">

<img src="img/azul.jpg">

<h3>Uniforme Azul</h3>

<p class="precio">$400</p>

<select id="talla3">

<option>CH</option>
<option>M</option>
<option>G</option>
<option>XL</option>

</select>

<button onclick="agregar('Uniforme Azul',400,'img/azul.jpg','talla3')">Agregar</button>

</div>

<div class="producto">

<img src="img/rojo.jpg">

<h3>Uniforme Rojo</h3>

<p class="precio">$400</p>

<select id="talla4">

<option>CH</option>
<option>M</option>
<option>G</option>
<option>XL</option>

</select>

<button onclick="agregar('Uniforme Rojo',400,'img/rojo.jpg','talla4')">Agregar</button>

</div>

</section>

<!-- CARRITO -->

<div class="carrito">

<h2>🛒 Carrito</h2>

<div id="lista"></div>

<p class="total">Total: $<span id="total">0</span></p>

<h3>Datos de envío</h3>

<input id="nombre" placeholder="Nombre">

<input id="direccion" placeholder="Dirección">

<button class="whatsapp" onclick="enviar()">Enviar pedido</button>

</div>

<footer>

© Uniformes Quirúrgicos

</footer>

<script>

let carrito = [0]

function agregar(nombre, precio, imagen, tallaId){

let talla = document.getElementById(tallaId).value

let productoExistente = carrito.find(p => p.nombre === nombre && p.talla === talla)

if(productoExistente){

productoExistente.cantidad++

}else{

carrito.push({
nombre,
precio,
imagen,
talla,
cantidad:1
})

}

actualizar()

}

function actualizar(){

let lista = document.getElementById("lista")

lista.innerHTML=""

let total = 0

carrito.forEach((p,index)=>{

let div=document.createElement("div")

div.className="item"

let subtotal = p.precio * p.cantidad

total += subtotal

div.innerHTML=`

<img src="${p.imagen}">

<div>

<b>${p.nombre}</b><br>

Talla: ${p.talla}<br>

Cantidad: ${p.cantidad}<br>

$${subtotal}

<br>

<button onclick="eliminar(${index})">Eliminar</button>

</div>

`

lista.appendChild(div)

})

document.getElementById("total").textContent = total

}

function eliminar(index){

carrito.splice(index,1)

actualizar()

}

function enviar(){

if(carrito.length===0){

alert("El carrito está vacío")

return

}

let nombre=document.getElementById("nombre").value
let direccion=document.getElementById("direccion").value

let total=document.getElementById("total").textContent

let mensaje="Pedido de uniformes:%0A"

carrito.forEach(p=>{

mensaje+=p.nombre+" Talla:"+p.talla+" Cant:"+p.cantidad+" $"+(p.precio*p.cantidad)+"%0A"

})

mensaje+="Total:$"+total+"%0A"

mensaje+="Cliente:"+nombre+"%0A"

mensaje+="Dirección:"+direccion

let numero="5215576673038"

window.open("https://wa.me/"+5587741101+"?text="+mensaje)

}

</script>

</body>
</html>
