<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tienda de Uniformes Quirúrgicos</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Uniformes Quirúrgicos Profesionales</h1>

</header>

<section class="productos">

<div class="producto">

<img src="https://i.imgur.com/0KFBHTB.jpg">

<h3>Uniforme Azul</h3>

<p>$450 MXN</p>

<button onclick="agregar('Uniforme Azul',450)">Agregar</button>

</div>

<div class="producto">

<img src="https://i.imgur.com/Td6XG9T.jpg">

<h3>Uniforme Verde</h3>

<p>$450 MXN</p>

<button onclick="agregar('Uniforme Verde',450)">Agregar</button>

</div>

<div class="producto">

<img src="https://i.imgur.com/b0W9X4S.jpg">

<h3>Uniforme Negro</h3>

<p>$480 MXN</p>

<button onclick="agregar('Uniforme Negro',480)">Agregar</button>

</div>

</section>

<section class="carrito">

<h2>Carrito</h2>

<ul id="lista"></ul>

<p>Total: $<span id="total">0</span></p>

</section>

<section class="pedido">

<h2>Datos de envío</h2>

<input type="text" id="nombre" placeholder="Nombre">

<input type="text" id="telefono" placeholder="Teléfono">

<input type="text" id="direccion" placeholder="Dirección de envío">

<button onclick="comprar()">Finalizar pedido</button>

</section>

<script src="script.js"></script>

</body>
</html>
