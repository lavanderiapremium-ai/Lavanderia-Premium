<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Uniformes Quirúrgicos</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f6ff;
}

/* MENU */

nav{
background:linear-gradient(90deg,#2b7cff,#00c6ff);
padding:15px;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
}

nav ul{
list-style:none;
display:flex;
gap:20px;
margin:0;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* CATALOGO */

.catalogo{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

/* PRODUCTOS */

.producto{
background:white;
border-radius:12px;
padding:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

.producto img{
width:100%;
border-radius:10px;
transition:0.3s;
}

.producto img:hover{
transform:scale(1.1);
}

.precio{
font-size:20px;
color:#2b7cff;
font-weight:bold;
}

select{
width:100%;
padding:8px;
margin-top:10px;
}

button{
margin-top:10px;
background:#25D366;
border:none;
color:white;
padding:12px;
border-radius:8px;
cursor:pointer;
width:100%;
font-weight:bold;
}

footer{
text-align:center;
padding:20px;
color:#777;
}

</style>

</head>

<body>

<nav>

<h2>🩺 Uniformes Quirúrgicos</h2>

<ul>
<li><a href="#">Inicio</a></li>
<li><a href="#">Catálogo</a></li>
<li><a href="#">Contacto</a></li>
</ul>

</nav>

<section class="catalogo">

<div class="producto">
<img src="img/rosa.jpg">
<h3>Uniforme Rosa</h3>
<p class="precio">$400</p>

<select id="talla1">
<option>CH</option>
<option>M</option>
<option>G</option>
<option>XL</option>
</select>

<button onclick="comprar('Uniforme Rosa',400,'talla1')">
Comprar por WhatsApp
</button>

</div>

<div class="producto">
<img src="img/amarillo.jpg">
<h3>Uniforme Amarillo</h3>
<p class="precio">$400</p>

<select id="talla2">
<option>CH</option>
<option>M</option>
<option>G</option>
<option>XL</option>
</select>

<button onclick="comprar('Uniforme Amarillo',400,'talla2')">
Comprar por WhatsApp
</button>

</div>

<div class="producto">
<img src="img/azul.jpg">
<h3>Uniforme Azul</h3>
<p class="precio">$400</p>

<select id="talla3">
<option>CH</option>
<option>M</option>
<option>G</option>
<option>XL</option>
</select>

<button onclick="comprar('Uniforme Azul',400,'talla3')">
Comprar por WhatsApp
</button>

</div>

<div class="producto">
<img src="img/rojo.jpg">
<h3>Uniforme Rojo</h3>
<p class="precio">$400</p>

<select id="talla4">
<option>CH</option>
<option>M</option>
<option>G</option>
<option>XL</option>
</select>

<button onclick="comprar('Uniforme Rojo',400,'talla4')">
Comprar por WhatsApp
</button>

</div>

</section>

<footer>
© Uniformes Quirúrgicos
</footer>

<script>

function comprar(producto,precio,tallaId){

let talla=document.getElementById(tallaId).value

let mensaje="Hola, quiero comprar:%0A"
mensaje+=producto+"%0A"
mensaje+="Talla: "+talla+"%0A"
mensaje+="Precio: $"+precio

let numero="5215576673038"

window.open("https://wa.me/"+numero+"?text="+mensaje)

}

</script>

</body>
  </html>
